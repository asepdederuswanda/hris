# HRIS Platform Configuration
# Dapat di-override via environment variables dengan prefix HRIS_
# Contoh: HRIS_DATABASE_PLATFORM_HOST=prod-db.example.com

server:
  port: "8080"
  mode: "debug"            # debug, release, test
  read_timeout: 30
  write_timeout: 30

database:
  # Driver database: "postgres" atau "mysql"
  driver: "mysql"

  # Platform database (single DB untuk manajemen platform)
  platform_host: "localhost"
  platform_port: 3306
  platform_db: "hris_platform"
  platform_user: "root"
  platform_password: ""
  # sslmode hanya untuk postgres, tidak dipakai mysql

  # Tenant database settings
  tenant_host: "localhost"
  tenant_port: 3306
  tenant_super_user: "root"
  tenant_super_password: ""
  # tenant_sslmode: "disable"

  # ====================================================================
  # Connection Pool Configuration
  # ====================================================================
  #
  # Platform pool (single database untuk manajemen platform):
  # Moderate pool karena hanya 1 DB.
  #
  # Tenant pool (satu pool PER tenant database):
  # Harus lebih kecil karena total koneksi = pool_size × jumlah tenant.
  # Contoh: 50 tenant × 10 open = 500 koneksi, masih reasonable.
  #
  # PgBouncer (recommended untuk production):
  #   - Transaction mode: pool_size=25, default_pool_size=10
  #   - Bisa handle 1000+ tenant dengan pool kecil
  # ====================================================================

  # Platform connection pool
  max_open_conns: 10                # Platform: 10 cukup untuk single DB
  max_idle_conns: 5                 # Platform: 5 idle
  conn_max_lifetime_ms: 3600000     # Platform: 1 jam

  # Tenant connection pool (per-tenant)
  tenant_max_open_conns: 10              # Per tenant: 10 (50 tenant = 500 total)
  tenant_max_idle_conns: 3               # Per tenant: 3 idle
  tenant_conn_max_lifetime_ms: 1800000   # Per tenant: 30 menit
  tenant_conn_max_idle_time_ms: 300000   # Per tenant: 5 menit idle → close

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

# ====================================================================
# Distributed Cache Configuration (Redis Pub/Sub)
# ====================================================================
# Cache menggunakan two-tier architecture:
#   Level 1: Local in-memory (sync.Map + TTL) — sub-millisecond, per instance
#   Level 2: Redis (shared key-value) — millisecond, shared across instances
#
# Cache invalidation via Redis Pub/Sub:
#   Saat instance A mengupdate data, dia publish pesan ke channel
#   "hris:cache:invalidate". Semua instance lain subscribe ke channel
#   tersebut dan langsung meng-evict local cache mereka.
cache:
  default_ttl: 300             # 5 menit (detik)
  key_prefix: "hris:cache"     # prefix untuk semua cache keys

jwt:
  secret: "change-this-to-a-strong-secret-in-production"
  access_token_ttl: 15     # menit
  refresh_token_ttl: 24    # jam
  issuer: "hris-platform"

logger:
  level: "debug"            # debug, info, warn, error
  format: "console"         # json, console
  output_path: "stdout"

otel:
  enabled: false
  service_name: "hris-platform"
  collector_endpoint: "localhost:4317"
  sample_rate: 0.1

# Encryption key untuk AES-256-GCM (32-byte hex-encoded, 64 characters)
# Wajib diset di production untuk mengenkripsi kredensial tenant DB
# encryption_key: ""

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"
  allow_credentials: true
  max_age: 86400
